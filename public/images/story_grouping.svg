<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#1a1a5e"/>
  <text x="400" y="50" text-anchor="middle" fill="#ffc107" font-family="Fredoka,sans-serif" font-size="32" font-weight="800">Making Equal Groups!</text>
  <!-- Group 1 -->
  <ellipse cx="150" cy="200" rx="70" ry="55" fill="none" stroke="#ffc107" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="150" y="210" text-anchor="middle" font-size="28"><N<N<N</text>
  <text x="150" y="280" text-anchor="middle" fill="#81c784" font-family="Fredoka,sans-serif" font-size="18" font-weight="700">Group 1</text>
  <!-- Group 2 -->
  <ellipse cx="320" cy="200" rx="70" ry="55" fill="none" stroke="#ffc107" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="320" y="210" text-anchor="middle" font-size="28"><N<N<N</text>
  <text x="320" y="280" text-anchor="middle" fill="#81c784" font-family="Fredoka,sans-serif" font-size="18" font-weight="700">Group 2</text>
  <!-- Group 3 -->
  <ellipse cx="490" cy="200" rx="70" ry="55" fill="none" stroke="#ffc107" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="490" y="210" text-anchor="middle" font-size="28"><N<N<N</text>
  <text x="490" y="280" text-anchor="middle" fill="#81c784" font-family="Fredoka,sans-serif" font-size="18" font-weight="700">Group 3</text>
  <!-- Group 4 -->
  <ellipse cx="660" cy="200" rx="70" ry="55" fill="none" stroke="#ffc107" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="660" y="210" text-anchor="middle" font-size="28"><N<N<N</text>
  <text x="660" y="280" text-anchor="middle" fill="#81c784" font-family="Fredoka,sans-serif" font-size="18" font-weight="700">Group 4</text>
  <rect x="200" y="330" width="400" height="50" rx="12" fill="rgba(255,193,7,0.15)" stroke="#ffc107" stroke-width="2"/>
  <text x="400" y="365" text-anchor="middle" fill="#ffd54f" font-family="Fredoka,sans-serif" font-size="26" font-weight="800">12 � 3 = 4 groups!</text>
</svg>
